<!DOCTYPE html>

<html class="dark" lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif:wght@300;400;700&amp;family=Manrope:wght@300;400;600;800&amp;family=Space+Grotesk:wght@300;500;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              colors: {
                "primary-container": "#d4af37",
                "on-secondary": "#68000d",
                "on-tertiary-container": "#254188",
                "tertiary": "#bfcdff",
                "outline": "#99907c",
                "background": "#131313",
                "inverse-primary": "#735c00",
                "surface-tint": "#e9c349",
                "secondary-container": "#8e111c",
                "secondary-fixed": "#ffdad7",
                "primary-fixed": "#ffe088",
                "on-tertiary": "#082b72",
                "on-primary-container": "#554300",
                "on-secondary-fixed": "#410005",
                "surface-dim": "#131313",
                "on-primary-fixed-variant": "#574500",
                "on-background": "#e5e2e1",
                "on-error-container": "#ffdad6",
                "tertiary-fixed": "#dbe1ff",
                "on-primary-fixed": "#241a00",
                "outline-variant": "#4d4635",
                "on-primary": "#3c2f00",
                "tertiary-fixed-dim": "#b4c5ff",
                "on-tertiary-fixed-variant": "#27438a",
                "on-secondary-fixed-variant": "#8e111c",
                "surface-container-highest": "#353534",
                "on-error": "#690005",
                "on-secondary-container": "#ff9994",
                "inverse-surface": "#e5e2e1",
                "secondary": "#ffb3af",
                "inverse-on-surface": "#313030",
                "tertiary-container": "#97b0ff",
                "error": "#ffb4ab",
                "surface-variant": "#353534",
                "primary": "#f2ca50",
                "on-surface": "#e5e2e1",
                "surface-bright": "#3a3939",
                "surface-container-lowest": "#0e0e0e",
                "surface": "#131313",
                "secondary-fixed-dim": "#ffb3af",
                "primary-fixed-dim": "#e9c349",
                "surface-container": "#201f1f",
                "error-container": "#93000a",
                "on-surface-variant": "#d0c5af",
                "surface-container-high": "#2a2a2a",
                "on-tertiary-fixed": "#00174b",
                "surface-container-low": "#1c1b1b"
              },
              fontFamily: {
                "noto-serif": ["Noto Serif"],
                "manrope": ["Manrope"],
                "space-grotesk": ["Space Grotesk"]
              },
              borderRadius: {"DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "full": "0.75rem"},
            },
          },
        }
    </script>
<style>
        body {
            background-color: #0d0d0d;
            background-image: radial-gradient(circle at 50% 50%, rgba(212, 175, 55, 0.03) 0%, transparent 70%);
        }
        .bingo-grid-cell {
            aspect-ratio: 1/1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Space Grotesk', sans-serif;
            font-size: 0.875rem;
            border-radius: 0.125rem;
            transition: all 0.3s ease;
        }
        .gold-glow {
            text-shadow: 0 0 20px rgba(242, 202, 80, 0.4);
        }
        .glass-panel {
            background: rgba(19, 19, 19, 0.6);
            backdrop-filter: blur(20px);
        }
        .b-col { color: #2E86DE; }
        .i-col { color: #00B894; }
        .n-col { color: #D4AF37; }
        .g-col { color: #E17055; }
        .o-col { color: #A855F7; }
    </style>
</head>
<body class="text-on-surface font-manrope selection:bg-primary-container/30 overflow-hidden h-screen flex flex-col">
<!-- TopAppBar -->
<header class="bg-[#131313] dark:bg-[#131313] flex justify-between items-center w-full px-12 py-6 docked full-width top-0 no-line tonal-shift bg-surface-container-low flat no shadows z-50">
<div class="flex items-center gap-4">
<span class="material-symbols-outlined text-[#D4AF37]" data-icon="menu">menu</span>
</div>
<h1 class="font-noto-serif font-light text-[#D4AF37] tracking-[0.2em] uppercase text-2xl">
            Meliá Hotels International
        </h1>
<div class="flex items-center gap-6">
<button class="text-[#99907C] hover:text-[#F2CA50] transition-colors duration-300">
<span class="material-symbols-outlined" data-icon="fullscreen">fullscreen</span>
</button>
<button class="text-[#99907C] hover:text-[#F2CA50] transition-colors duration-300">
<span class="material-symbols-outlined" data-icon="settings">settings</span>
</button>
</div>
</header>
<!-- Main Content Stage -->
<main class="flex-grow flex flex-col items-center justify-center px-12 pb-24 relative">
<!-- Subtle Animated Confetti Placeholder (Visual only) -->
<div class="absolute inset-0 pointer-events-none overflow-hidden opacity-20">
<div class="absolute top-1/4 left-1/4 w-1 h-1 bg-primary rounded-full blur-[1px]"></div>
<div class="absolute top-1/3 right-1/4 w-1 h-1 bg-primary-container rounded-full blur-[1px]"></div>
<div class="absolute bottom-1/4 left-1/3 w-1.5 h-1.5 bg-primary-fixed rounded-full blur-[1px]"></div>
<div class="absolute top-1/2 right-1/3 w-1 h-1 bg-primary rounded-full blur-[1px]"></div>
</div>
<!-- Hero Section (Center 40%) -->
<div class="w-full max-w-4xl flex flex-col items-center justify-center py-12">
<!-- Pool of Light behind Current Number -->
<div class="absolute w-[500px] h-[500px] bg-primary/5 rounded-full blur-[120px] -z-10"></div>
<div class="relative group">
<div class="absolute -inset-1 bg-gradient-to-br from-primary to-primary-container rounded-full blur opacity-25 group-hover:opacity-40 transition duration-1000"></div>
<div class="relative bg-surface-container-lowest border border-primary/10 w-64 h-64 rounded-full flex flex-col items-center justify-center shadow-2xl">
<span class="text-primary font-noto-serif text-3xl tracking-widest uppercase mb-1">N</span>
<span class="text-on-surface font-noto-serif text-9xl font-bold leading-none gold-glow">42</span>
</div>
</div>
<div class="mt-8 text-center">
<p class="font-space-grotesk text-outline uppercase tracking-[0.3em] text-sm mb-2">Último número cantado</p>
<div class="flex items-center gap-3 justify-center">
<span class="h-[1px] w-12 bg-primary/20"></span>
<span class="font-space-grotesk text-primary text-xl font-bold">Números cantados: 12 / 75</span>
<span class="h-[1px] w-12 bg-primary/20"></span>
</div>
</div>
</div>
<!-- History Grid (Asymmetric layout) -->
<div class="w-full max-w-6xl grid grid-cols-1 md:grid-cols-5 gap-6 mt-4">
<!-- B Column -->
<div class="bg-surface-container-lowest/40 p-4 rounded-lg">
<h3 class="b-col font-noto-serif text-2xl font-bold text-center mb-4 tracking-widest">B</h3>
<div class="grid grid-cols-3 gap-1">
<!-- Example Numbers -->
<div class="bingo-grid-cell bg-surface-container-highest/20 text-outline">1</div>
<div class="bingo-grid-cell bg-[#2E86DE] text-white font-bold ring-1 ring-[#2E86DE]/50">4</div>
<div class="bingo-grid-cell bg-surface-container-highest/20 text-outline">7</div>
<div class="bingo-grid-cell bg-surface-container-highest/20 text-outline">9</div>
<div class="bingo-grid-cell bg-[#2E86DE] text-white font-bold ring-1 ring-[#2E86DE]/50">12</div>
<div class="bingo-grid-cell bg-surface-container-highest/20 text-outline">15</div>
</div>
</div>
<!-- I Column -->
<div class="bg-surface-container-lowest/40 p-4 rounded-lg">
<h3 class="i-col font-noto-serif text-2xl font-bold text-center mb-4 tracking-widest">I</h3>
<div class="grid grid-cols-3 gap-1">
<div class="bingo-grid-cell bg-surface-container-highest/20 text-outline">16</div>
<div class="bingo-grid-cell bg-[#00B894] text-white font-bold ring-1 ring-[#00B894]/50">21</div>
<div class="bingo-grid-cell bg-surface-container-highest/20 text-outline">24</div>
<div class="bingo-grid-cell bg-[#00B894] text-white font-bold ring-1 ring-[#00B894]/50">27</div>
<div class="bingo-grid-cell bg-surface-container-highest/20 text-outline">29</div>
<div class="bingo-grid-cell bg-surface-container-highest/20 text-outline">30</div>
</div>
</div>
<!-- N Column -->
<div class="bg-surface-container-lowest/40 p-4 rounded-lg border-t border-primary/20">
<h3 class="n-col font-noto-serif text-2xl font-bold text-center mb-4 tracking-widest">N</h3>
<div class="grid grid-cols-3 gap-1">
<div class="bingo-grid-cell bg-surface-container-highest/20 text-outline">31</div>
<div class="bingo-grid-cell bg-surface-container-highest/20 text-outline">35</div>
<div class="bingo-grid-cell bg-[#D4AF37] text-white font-bold ring-1 ring-[#D4AF37]/50">42</div>
<div class="bingo-grid-cell bg-surface-container-highest/20 text-outline">38</div>
<div class="bingo-grid-cell bg-[#D4AF37] text-white font-bold ring-1 ring-[#D4AF37]/50">40</div>
<div class="bingo-grid-cell bg-surface-container-highest/20 text-outline">45</div>
</div>
</div>
<!-- G Column -->
<div class="bg-surface-container-lowest/40 p-4 rounded-lg">
<h3 class="g-col font-noto-serif text-2xl font-bold text-center mb-4 tracking-widest">G</h3>
<div class="grid grid-cols-3 gap-1">
<div class="bingo-grid-cell bg-[#E17055] text-white font-bold ring-1 ring-[#E17055]/50">48</div>
<div class="bingo-grid-cell bg-surface-container-highest/20 text-outline">51</div>
<div class="bingo-grid-cell bg-[#E17055] text-white font-bold ring-1 ring-[#E17055]/50">55</div>
<div class="bingo-grid-cell bg-surface-container-highest/20 text-outline">58</div>
<div class="bingo-grid-cell bg-surface-container-highest/20 text-outline">59</div>
<div class="bingo-grid-cell bg-surface-container-highest/20 text-outline">60</div>
</div>
</div>
<!-- O Column -->
<div class="bg-surface-container-lowest/40 p-4 rounded-lg">
<h3 class="o-col font-noto-serif text-2xl font-bold text-center mb-4 tracking-widest">O</h3>
<div class="grid grid-cols-3 gap-1">
<div class="bingo-grid-cell bg-surface-container-highest/20 text-outline">61</div>
<div class="bingo-grid-cell bg-[#A855F7] text-white font-bold ring-1 ring-[#A855F7]/50">65</div>
<div class="bingo-grid-cell bg-surface-container-highest/20 text-outline">69</div>
<div class="bingo-grid-cell bg-surface-container-highest/20 text-outline">71</div>
<div class="bingo-grid-cell bg-[#A855F7] text-white font-bold ring-1 ring-[#A855F7]/50">74</div>
<div class="bingo-grid-cell bg-surface-container-highest/20 text-outline">75</div>
</div>
</div>
</div>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-center gap-8 items-center px-12 pb-10 bg-[#131313]/60 backdrop-blur-xl shadow-[0_-4px_40px_rgba(142,17,28,0.06)] h-24">
<button class="group flex flex-col items-center justify-center text-[#E5E2E1] px-12 py-3 active:scale-95 transition-all hover:bg-secondary-container/10 rounded-sm">
<span class="material-symbols-outlined mb-1 group-hover:text-secondary-container" data-icon="pause_circle">pause_circle</span>
<span class="font-manrope font-bold tracking-[0.2em] text-sm">PAUSAR</span>
</button>
<!-- Divider Jewel -->
<div class="w-2 h-2 rounded-full bg-primary/20"></div>
<button class="group flex flex-col items-center justify-center bg-[#8E111C] text-white rounded-sm px-12 py-3 shadow-lg shadow-on-secondary/20 active:scale-95 transition-all hover:bg-[#8E111C]/90">
<span class="material-symbols-outlined mb-1" data-icon="refresh">refresh</span>
<span class="font-manrope font-bold tracking-[0.2em] text-sm">NUEVO JUEGO</span>
</button>
</nav>
<!-- Decorative Sidebar Pool of Light -->
<div class="fixed top-1/2 -left-32 w-64 h-64 bg-primary/5 rounded-full blur-[100px] pointer-events-none"></div>
<div class="fixed top-1/2 -right-32 w-64 h-64 bg-secondary-container/5 rounded-full blur-[100px] pointer-events-none"></div>
</body></html>
