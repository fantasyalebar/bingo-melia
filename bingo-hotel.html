<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BINGO — Meliá Hotels International</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif:wght@300;400;700&family=Manrope:wght@300;400;600;800&family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
<style>
/* ===== VARIABLES & RESET ===== */
:root {
  --bg: #0D0D0D;
  --bg-light: #131313;
  --bg-lowest: #0E0E0E;
  --surface-high: #2A2A2A;
  --surface-highest: #353534;
  --gold: #F2CA50;
  --gold-dark: #D4AF37;
  --red: #8E111C;
  --outline: #99907C;
  --col-b: #2E86DE;
  --col-i: #00B894;
  --col-n: #D4AF37;
  --col-g: #E17055;
  --col-o: #A855F7;
  --text: #E5E2E1;
  --text-dim: rgba(153,144,124,0.5);
}

*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  width: 100%; height: 100%; overflow: hidden;
  background:
    radial-gradient(circle at 50% 50%, rgba(212,175,55,0.03) 0%, transparent 70%),
    var(--bg);
  color: var(--text);
  font-family: 'Manrope', 'Segoe UI', system-ui, sans-serif;
  user-select: none;
  -webkit-user-select: none;
}

/* Vignette overlay */
body::after {
  content: '';
  position: fixed; top: 0; left: 0;
  width: 100%; height: 100%;
  background: radial-gradient(ellipse at 50% 50%, transparent 55%, rgba(0,0,0,0.4) 100%);
  pointer-events: none; z-index: 0;
}

/* ===== PARTICLES CANVAS ===== */
#particles {
  position: fixed; top: 0; left: 0;
  width: 100%; height: 100%;
  z-index: 0; pointer-events: none;
}

/* ===== TYPOGRAPHY ===== */
.font-display { font-family: 'Noto Serif', Georgia, serif; }
.font-title  { font-family: 'Noto Serif', Georgia, serif; }
.font-body   { font-family: 'Manrope', 'Segoe UI', system-ui, sans-serif; }
.font-tech   { font-family: 'Space Grotesk', monospace; }

/* Material Symbols */
.material-symbols-outlined {
  font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
  font-size: inherit;
}

/* ===== BUTTONS ===== */
.btn {
  font-family: 'Manrope', 'Segoe UI', sans-serif;
  font-weight: 700; font-size: 19px;
  padding: 14px 40px;
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 4px;
  cursor: pointer;
  text-transform: uppercase; letter-spacing: 2px;
  transition: transform 0.15s, box-shadow 0.25s;
  position: relative; overflow: hidden;
}
.btn::after {
  content: ''; position: absolute; inset: 0;
  background: rgba(255,255,255,0); transition: background 0.2s;
}
.btn:hover::after { background: rgba(255,255,255,0.08); }
.btn:hover  { transform: translateY(-2px); }
.btn:active { transform: translateY(0); }

.btn-gold {
  background: linear-gradient(135deg, var(--gold), var(--gold-dark));
  color: #1a1a1a;
  border: 1px solid rgba(212,175,55,0.4);
  box-shadow: 0 4px 24px rgba(212,175,55,0.3);
}
.btn-gold:hover { box-shadow: 0 6px 32px rgba(212,175,55,0.5); }

.btn-red {
  background: linear-gradient(135deg, #a8132a, var(--red));
  color: white;
  box-shadow: 0 4px 20px rgba(142,17,28,0.25);
}
.btn-red:hover { box-shadow: 0 6px 28px rgba(142,17,28,0.45); }

.btn-outline {
  background: rgba(255,255,255,0.04); color: var(--text);
  border: 1px solid rgba(153,144,124,0.3);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
}
.btn-outline:hover { border-color: var(--gold); color: var(--gold); }

.btn-icon {
  width: 44px; height: 44px;
  border: none;
  border-radius: 4px;
  background: transparent;
  color: var(--outline); font-size: 24px;
  cursor: pointer; transition: color 0.3s;
  display: flex; align-items: center; justify-content: center;
}
.btn-icon:hover { color: var(--gold); }

/* ===== SCREENS ===== */
.screen {
  position: fixed; top: 0; left: 0;
  width: 100%; height: 100%;
  display: none; z-index: 1;
}
.screen.active { display: flex; }

/* ===== WELCOME SCREEN ===== */
#screen-welcome {
  flex-direction: column;
  align-items: center; justify-content: center;
  gap: 40px; z-index: 2;
}

.welcome-resort {
  font-family: 'Noto Serif', Georgia, serif;
  font-weight: 300; font-size: 28px;
  letter-spacing: 0.2em;
  color: var(--gold-dark);
  text-transform: uppercase;
  opacity: 0; animation: fade-up 0.8s 0.2s ease both;
}

.welcome-ornament {
  display: flex; align-items: center; gap: 16px;
  color: var(--gold-dark);
  opacity: 0; animation: fade-up 0.5s 0.7s ease both;
  margin-top: -8px;
}
.welcome-ornament .line {
  width: 60px; height: 1px;
  background: linear-gradient(90deg, transparent, var(--gold-dark), transparent);
}
.welcome-ornament .diamond {
  font-size: 12px; opacity: 0.8;
}

.welcome-title {
  display: flex; gap: 24px;
  font-family: 'Noto Serif', Georgia, serif;
  font-size: 160px; font-weight: 700;
}
.welcome-title span {
  display: inline-block;
  opacity: 0; animation: elegant-letter-in 0.6s ease both;
  text-shadow: 0 4px 30px rgba(0,0,0,0.5);
}
.welcome-title span:nth-child(1) { color: var(--col-b); animation-delay: 0.9s; }
.welcome-title span:nth-child(2) { color: var(--col-i); animation-delay: 1.05s; }
.welcome-title span:nth-child(3) { color: var(--col-n); animation-delay: 1.2s; }
.welcome-title span:nth-child(4) { color: var(--col-g); animation-delay: 1.35s; }
.welcome-title span:nth-child(5) { color: var(--col-o); animation-delay: 1.5s; }

.welcome-btn-wrap {
  opacity: 0; animation: fade-up 0.5s 1.8s ease both;
}

/* ===== GAME SCREEN ===== */
#screen-game {
  flex-direction: column;
  padding: 0 0 96px 0;
  position: relative;
}
#screen-game > *:not(.game-bg):not(.pool-light) {
  position: relative;
  z-index: 1;
}

/* ===== HEADER ===== */
.header {
  display: flex; align-items: center; justify-content: space-between;
  height: 64px; flex-shrink: 0;
  padding: 0 48px;
  background: rgba(19,19,19,0.6);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
}
.header-logo {
  font-family: 'Noto Serif', Georgia, serif;
  font-weight: 300; font-size: 20px;
  letter-spacing: 0.2em;
  color: var(--gold-dark);
  text-transform: uppercase;
}
.header-right {
  display: flex; align-items: center; gap: 8px;
}

/* ===== CURRENT NUMBER AREA ===== */
.current-area {
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  flex: 0.8; min-height: 0;
  padding: 4px 0 0;
  position: relative;
}

/* Pool of Light behind number */
.current-area::before {
  content: '';
  position: absolute;
  width: 500px; height: 500px;
  background: radial-gradient(circle, rgba(242,202,80,0.05) 0%, transparent 70%);
  border-radius: 50%;
  filter: blur(80px);
  pointer-events: none;
}

/* Bingo Ball → Rounded Square Card */
.ball-wrap {
  position: relative;
}
.ball-halo {
  position: absolute; inset: -4px;
  background: linear-gradient(135deg, var(--gold), var(--gold-dark));
  border-radius: 16px;
  filter: blur(8px);
  opacity: 0.25;
  transition: opacity 1s;
}
.ball-wrap:hover .ball-halo { opacity: 0.4; }

.bingo-ball {
  width: min(260px, 32vh); height: min(260px, 32vh);
  border-radius: 12px;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  position: relative;
  background: var(--bg-lowest);
  border: 1px solid rgba(212,175,55,0.1);
  box-shadow: 0 25px 50px rgba(0,0,0,0.5);
}
.bingo-ball.animate { animation: ball-reveal 0.6s ease both; }

.ball-letter {
  font-family: 'Noto Serif', Georgia, serif;
  font-size: 32px; font-weight: 300;
  color: var(--gold);
  letter-spacing: 0.2em;
  text-transform: uppercase;
  margin-bottom: 2px;
}
.ball-number {
  font-family: 'Noto Serif', Georgia, serif;
  font-size: min(120px, 15vh); font-weight: 700;
  line-height: 1;
  color: var(--text);
  text-shadow: 0 0 20px rgba(242,202,80,0.4);
}

.ball-empty {
  width: min(260px, 32vh); height: min(260px, 32vh);
  border-radius: 12px;
  border: 2px dashed rgba(153,144,124,0.2);
  display: flex; align-items: center; justify-content: center;
}
.ball-empty span {
  font-family: 'Noto Serif', Georgia, serif;
  font-size: 60px; color: rgba(153,144,124,0.15);
}

/* Counter below ball */
.current-info {
  margin-top: 16px; text-align: center;
}
.current-label {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 12px;
  color: var(--outline);
  text-transform: uppercase;
  letter-spacing: 0.3em;
  margin-bottom: 6px;
}
.current-counter {
  display: flex; align-items: center; gap: 12px; justify-content: center;
}
.current-counter .line {
  width: 48px; height: 1px;
  background: rgba(212,175,55,0.2);
}
.counter {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 18px; font-weight: 700;
  color: var(--gold);
}

/* Progress Bar */
.progress-wrap {
  width: 300px; height: 3px;
  background: rgba(255,255,255,0.06);
  border-radius: 2px;
  margin-top: 12px; overflow: hidden;
  transition: opacity 0.3s;
}
.progress-bar {
  height: 100%; width: 100%;
  background: linear-gradient(90deg, var(--gold), var(--gold-dark));
  border-radius: 2px;
  transform-origin: left;
  box-shadow: 0 0 8px rgba(212,175,55,0.3);
}

/* ===== RECENT STRIP ===== */
.recent-strip {
  display: flex; align-items: center; justify-content: center;
  gap: 6px; height: 44px; flex-shrink: 0;
  padding: 4px 0;
}
.recent-label {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 12px; color: var(--outline);
  text-transform: uppercase; letter-spacing: 0.2em;
  margin-right: 4px;
}
.recent-num {
  display: inline-flex; align-items: center; justify-content: center;
  width: 38px; height: 38px; border-radius: 4px;
  font-family: 'Space Grotesk', sans-serif;
  font-size: 15px; font-weight: 700; color: white;
  animation: smooth-pop 0.35s ease both;
}

/* ===== HISTORY GRID — 5 COLUMN CARDS ===== */
.grid-wrap {
  flex: 1; min-height: 0;
  display: flex;
  gap: 10px;
  padding: 0 36px;
  margin-top: 4px;
}

.grid-column-card {
  flex: 1;
  background: rgba(14,14,14,0.4);
  border-radius: 8px;
  padding: 8px 6px;
  display: flex;
  flex-direction: column;
  min-height: 0;
}
.grid-column-card.col-n-card {
  border-top: 1px solid rgba(212,175,55,0.2);
}

.grid-column-header {
  font-family: 'Noto Serif', Georgia, serif;
  font-size: 22px; font-weight: 700;
  text-align: center;
  margin-bottom: 6px;
  letter-spacing: 0.2em;
}

.grid-column-cells {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  grid-template-rows: repeat(3, 1fr);
  gap: 3px;
  flex: 1; min-height: 0;
}

.grid-cell {
  display: flex; align-items: center; justify-content: center;
  border-radius: 3px;
  font-family: 'Space Grotesk', sans-serif;
  font-size: 14px;
  background: rgba(53,53,52,0.2);
  color: var(--outline);
  transition: all 0.3s ease;
}

.grid-cell.drawn {
  color: white; font-weight: 700;
  animation: cell-scale 0.35s ease;
}
.grid-cell.drawn.col-b { background: var(--col-b); box-shadow: 0 0 0 1px rgba(46,134,222,0.5); }
.grid-cell.drawn.col-i { background: var(--col-i); box-shadow: 0 0 0 1px rgba(0,184,148,0.5); }
.grid-cell.drawn.col-n { background: var(--col-n); box-shadow: 0 0 0 1px rgba(212,175,55,0.5); }
.grid-cell.drawn.col-g { background: var(--col-g); box-shadow: 0 0 0 1px rgba(225,112,85,0.5); }
.grid-cell.drawn.col-o { background: var(--col-o); box-shadow: 0 0 0 1px rgba(168,85,247,0.5); }

.grid-cell.last-drawn {
  box-shadow: 0 0 8px 2px currentColor;
  transform: scale(1.08); z-index: 2;
}

/* ===== BOTTOM NAV ===== */
.bottom-nav {
  position: fixed; bottom: 0; left: 0;
  width: 100%; z-index: 50;
  display: flex; justify-content: center; align-items: center;
  gap: 24px;
  padding: 0 48px 28px;
  height: 88px;
  background: rgba(19,19,19,0.6);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  box-shadow: 0 -4px 40px rgba(142,17,28,0.06);
}

.nav-btn {
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 10px 36px;
  border-radius: 4px;
  font-family: 'Manrope', sans-serif;
  font-weight: 700; font-size: 12px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  cursor: pointer; border: none;
  transition: all 0.15s;
  gap: 4px;
}
.nav-btn:active { transform: scale(0.95); }
.nav-btn .material-symbols-outlined { font-size: 22px; }

.nav-btn-ghost {
  background: transparent;
  color: var(--text);
}
.nav-btn-ghost:hover { background: rgba(142,17,28,0.1); }

.nav-btn-bingo {
  background: linear-gradient(135deg, var(--gold), var(--gold-dark));
  color: #1a1a1a;
  box-shadow: 0 4px 20px rgba(212,175,55,0.3);
}
.nav-btn-bingo:hover { box-shadow: 0 6px 28px rgba(212,175,55,0.5); }

.nav-btn-filled {
  background: var(--red);
  color: white;
  box-shadow: 0 4px 20px rgba(142,17,28,0.3);
}
.nav-btn-filled:hover { background: #a8132a; }

.nav-divider {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: rgba(242,202,80,0.2);
}

/* ===== OVERLAYS ===== */
.overlay {
  position: fixed; top: 0; left: 0;
  width: 100%; height: 100%;
  display: none; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 40px; z-index: 10;
  background: rgba(13,13,13,0.92);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
}
.overlay.active { display: flex; }

.bingo-text {
  font-family: 'Noto Serif', Georgia, serif;
  font-size: 160px; font-weight: 700;
  color: var(--gold);
  text-shadow:
    0 0 40px rgba(242,202,80,0.8),
    0 0 100px rgba(242,202,80,0.3),
    0 6px 20px rgba(0,0,0,0.5);
  animation: bingo-glow 0.8s ease infinite alternate;
}
.bingo-sub {
  font-family: 'Manrope', sans-serif;
  font-size: 22px; font-weight: 300;
  color: var(--outline);
  letter-spacing: 0.2em;
  text-transform: uppercase;
  margin-top: -20px;
  opacity: 0; animation: fade-up 0.6s 0.3s ease both;
}
.fin-text {
  font-family: 'Noto Serif', Georgia, serif;
  font-size: 52px; font-weight: 700;
  color: var(--outline);
  text-align: center;
}
.fin-sub {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 20px; color: rgba(153,144,124,0.5);
  margin-top: -20px;
}

/* ===== ANIMATIONS ===== */
@keyframes ball-reveal {
  0%   { transform: scale(0.6); opacity: 0; filter: blur(12px); }
  50%  { opacity: 1; filter: blur(3px); }
  100% { transform: scale(1); opacity: 1; filter: blur(0); }
}

@keyframes cell-scale {
  0%   { transform: scale(0.85); opacity: 0; }
  70%  { transform: scale(1.08); }
  100% { transform: scale(1); opacity: 1; }
}

@keyframes bingo-glow {
  from { transform: scale(1);    text-shadow: 0 0 40px rgba(242,202,80,0.8), 0 0 100px rgba(242,202,80,0.3); }
  to   { transform: scale(1.02); text-shadow: 0 0 60px rgba(242,202,80,0.9), 0 0 140px rgba(242,202,80,0.5); }
}

@keyframes elegant-letter-in {
  0%   { opacity: 0; transform: translateY(30px); }
  100% { opacity: 1; transform: translateY(0); }
}

@keyframes fade-up {
  from { opacity: 0; transform: translateY(20px); }
  to   { opacity: 1; transform: translateY(0); }
}

@keyframes smooth-pop {
  0%   { opacity: 0; transform: scale(0.7); }
  70%  { transform: scale(1.06); }
  100% { opacity: 1; transform: scale(1); }
}

/* ===== DECORATIVE POOLS OF LIGHT ===== */
.pool-light {
  position: fixed;
  border-radius: 50%;
  pointer-events: none;
  z-index: 0;
}
.pool-left {
  top: 50%; left: -128px;
  width: 256px; height: 256px;
  background: rgba(242,202,80,0.05);
  filter: blur(100px);
}
.pool-right {
  top: 50%; right: -128px;
  width: 256px; height: 256px;
  background: rgba(142,17,28,0.05);
  filter: blur(100px);
}

/* ===== GAME BACKGROUND — Bingo Balls SVG ===== */
.game-bg {
  position: fixed;
  top: -8%; left: -8%;
  width: 116%; height: 116%;
  z-index: 0;
  pointer-events: none;
  animation: bg-drift 55s ease-in-out infinite alternate;
}

@keyframes bg-drift {
  0%   { transform: translate(0, 0); }
  50%  { transform: translate(3%, -2%); }
  100% { transform: translate(-1%, 2.5%); }
}
</style>
</head>
<body>

<canvas id="particles"></canvas>

<!-- ===== WELCOME SCREEN ===== -->
<div id="screen-welcome" class="screen active">
  <div class="welcome-resort">Meliá Hotels International</div>
  <div class="welcome-ornament">
    <span class="line"></span>
    <span class="diamond">◆</span>
    <span class="line"></span>
  </div>
  <div class="welcome-title">
    <span>B</span><span>I</span><span>N</span><span>G</span><span>O</span>
  </div>
  <div class="welcome-btn-wrap">
    <button class="btn btn-gold" id="btn-start" style="font-size:22px; padding:16px 56px;">
      Iniciar Juego
    </button>
  </div>
</div>

<!-- ===== GAME SCREEN ===== -->
<div id="screen-game" class="screen">
  <!-- Decorative Pools of Light -->
  <div class="pool-light pool-left"></div>
  <div class="pool-light pool-right"></div>

  <!-- Animated Background — Bingo Balls -->
  <svg class="game-bg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice" aria-hidden="true">
    <defs>
      <filter id="bg-soft"><feGaussianBlur stdDeviation="1.5"/></filter>
    </defs>
    <!-- Decorative rings -->
    <circle cx="350" cy="450" r="260" fill="none" stroke="#D4AF37" stroke-width="0.8" opacity="0.04"/>
    <circle cx="1250" cy="320" r="300" fill="none" stroke="#2E86DE" stroke-width="0.8" opacity="0.03"/>
    <circle cx="800" cy="750" r="200" fill="none" stroke="#A855F7" stroke-width="0.6" opacity="0.03"/>
    <!-- Ball B-7 -->
    <g opacity="0.09" filter="url(#bg-soft)">
      <circle cx="120" cy="160" r="52" fill="#2E86DE"/>
      <rect x="68" y="148" width="104" height="24" rx="5" fill="rgba(255,255,255,0.85)"/>
      <text x="120" y="166" text-anchor="middle" font-family="Arial,sans-serif" font-size="17" font-weight="bold" fill="#2E86DE">7</text>
    </g>
    <!-- Ball N-34 -->
    <g opacity="0.07" filter="url(#bg-soft)">
      <circle cx="460" cy="95" r="68" fill="#D4AF37"/>
      <rect x="392" y="80" width="136" height="30" rx="6" fill="rgba(255,255,255,0.85)"/>
      <text x="460" y="102" text-anchor="middle" font-family="Arial,sans-serif" font-size="20" font-weight="bold" fill="#D4AF37">34</text>
    </g>
    <!-- Ball O-68 -->
    <g opacity="0.08" filter="url(#bg-soft)">
      <circle cx="1380" cy="190" r="55" fill="#A855F7"/>
      <rect x="1325" y="177" width="110" height="26" rx="5" fill="rgba(255,255,255,0.85)"/>
      <text x="1380" y="196" text-anchor="middle" font-family="Arial,sans-serif" font-size="18" font-weight="bold" fill="#A855F7">68</text>
    </g>
    <!-- Ball I-22 -->
    <g opacity="0.07" filter="url(#bg-soft)">
      <circle cx="920" cy="760" r="60" fill="#00B894"/>
      <rect x="860" y="747" width="120" height="26" rx="5" fill="rgba(255,255,255,0.85)"/>
      <text x="920" y="766" text-anchor="middle" font-family="Arial,sans-serif" font-size="18" font-weight="bold" fill="#00B894">22</text>
    </g>
    <!-- Ball G-52 -->
    <g opacity="0.06" filter="url(#bg-soft)">
      <circle cx="1460" cy="670" r="48" fill="#E17055"/>
      <rect x="1412" y="659" width="96" height="22" rx="5" fill="rgba(255,255,255,0.85)"/>
      <text x="1460" y="675" text-anchor="middle" font-family="Arial,sans-serif" font-size="15" font-weight="bold" fill="#E17055">52</text>

<nav class="bottom-nav" id="bottom-nav" style="display:none;">

  </button>
  <div class="nav-divider"></div>
  <button class="nav-btn nav-btn-bingo" id="btn-bingo">
    <span class="material-symbols-outlined">star</span>
    <span>¡BINGO!</span>
  </button>

  <button class="nav-btn nav-btn-filled" id="btn-new">
    <span class="material-symbols-outlined">refresh</span>
    <span>Nuevo Juego</span>
  </button>

<!-- ===== BINGO OVERLAY ===== -->
<div id="overlay-bingo" class="overlay">
  <div class="bingo-text">¡BINGO!</div>
  <div class="bingo-sub">¡Tenemos un ganador!</div>
  <button class="btn btn-gold" id="btn-new-bingo" style="font-size:20px;">Nuevo Juego</button>
</div>

<!-- ===== FIN OVERLAY ===== -->
<div id="overlay-fin" class="overlay">
  <div class="fin-text">Todos los números<br>han sido cantados</div>
  <div class="fin-sub">75 / 75</div>
  <button class="btn btn-gold" id="btn-new-fin">Nuevo Juego</button>
</div>

<script>
// ======================================================================
//  CONFIGURATION
// ======================================================================
const DRAW_INTERVAL_MS = 8000;

// Column definitions
const COLS = [
  { letter: 'B', color: '#2E86DE', start: 1,  end: 15 },
  { letter: 'I', color: '#00B894', start: 16, end: 30 },
  { letter: 'N', color: '#D4AF37', start: 31, end: 45 },
  { letter: 'G', color: '#E17055', start: 46, end: 60 },
  { letter: 'O', color: '#A855F7', start: 61, end: 75 },
];

// ======================================================================
//  STATE
// ======================================================================
let state = 'INICIO';
let numbers = [];
let drawIndex = 0;
let drawnSet = new Set();
let timerId = null;
let progressStart = 0;
let progressRAF = null;
let soundEnabled = true;
let audioCtx = null;
let particleMode = 'ambient';

// ======================================================================
//  HELPERS
// ======================================================================
function getCol(n) {
  return COLS[Math.floor((n - 1) / 15)];
}

function colClass(n) {
  return 'col-' + getCol(n).letter.toLowerCase();
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

// ======================================================================
//  DOM REFERENCES
// ======================================================================
const $ = (id) => document.getElementById(id);
const screenWelcome = $('screen-welcome');
const screenGame    = $('screen-game');
const overlayBingo  = $('overlay-bingo');
const overlayFin    = $('overlay-fin');
const ballDisplay   = $('ball-display');
const progressWrap  = $('progress-wrap');
const progressBar   = $('progress-bar');
const recentStrip   = $('recent-strip');
const gridEl        = $('grid');
const counterEl     = $('counter');
const btnPause      = $('btn-pause');
const btnSound      = $('btn-sound');
const bottomNav     = $('bottom-nav');

// ======================================================================
//  GRID BUILDER — 5 vertical column cards
// ======================================================================
function buildGrid() {
  gridEl.innerHTML = '';
  COLS.forEach((col) => {
    const card = document.createElement('div');
    card.className = 'grid-column-card';
    if (col.letter === 'N') card.classList.add('col-n-card');

    const header = document.createElement('h3');
    header.className = 'grid-column-header';
    header.style.color = col.color;
    header.textContent = col.letter;
    card.appendChild(header);

    const cells = document.createElement('div');
    cells.className = 'grid-column-cells';
    for (let n = col.start; n <= col.end; n++) {
      const cell = document.createElement('div');
      cell.className = 'grid-cell ' + colClass(n);
      cell.id = 'cell-' + n;
      cell.textContent = n;
      cells.appendChild(cell);
    }
    card.appendChild(cells);
    gridEl.appendChild(card);
  });
}

// ======================================================================
//  SCREEN MANAGEMENT
// ======================================================================
function showScreen(name) {
  screenWelcome.classList.remove('active');
  screenGame.classList.remove('active');
  overlayBingo.classList.remove('active');
  overlayFin.classList.remove('active');
  bottomNav.style.display = 'none';

  switch (name) {
    case 'welcome': screenWelcome.classList.add('active'); break;
    case 'game':
      screenGame.classList.add('active');
      bottomNav.style.display = 'flex';
      break;
    case 'bingo':
      screenGame.classList.add('active');
      bottomNav.style.display = 'flex';
      overlayBingo.classList.add('active');
      break;
    case 'fin':
      screenGame.classList.add('active');
      bottomNav.style.display = 'flex';
      overlayFin.classList.add('active');
      break;
  }
}

// ======================================================================
//  BALL RENDERING — Rounded square card with gold halo
// ======================================================================
function renderBall(num) {
  const col = getCol(num);
  ballDisplay.innerHTML =
    '<div class="ball-wrap">' +
      '<div class="ball-halo"></div>' +
      '<div class="bingo-ball animate">' +
        '<div class="ball-letter" style="color:' + col.color + '">' + col.letter + '</div>' +
        '<div class="ball-number">' + num + '</div>' +
      '</div>' +
    '</div>';
}

function renderEmptyBall() {
  ballDisplay.innerHTML = '<div class="ball-empty"><span>?</span></div>';
}

// ======================================================================
//  RECENT STRIP
// ======================================================================
function updateRecent() {
  let html = '<span class="recent-label">Últimos:</span>';
  const count = Math.min(drawIndex, 10);
  for (let i = drawIndex - 1; i >= drawIndex - count; i--) {
    const n = numbers[i];
    const c = getCol(n);
    html += '<span class="recent-num" style="background:' + c.color + '">' + n + '</span>';
  }
  recentStrip.innerHTML = html;
}

// ======================================================================
//  GRID MARK
// ======================================================================
function markDrawn(num) {
  const cell = $('cell-' + num);
  if (!cell) return;
  const prev = gridEl.querySelector('.last-drawn');
  if (prev) prev.classList.remove('last-drawn');
  cell.classList.add('drawn');
  cell.classList.add('last-drawn');
}

// ======================================================================
//  PROGRESS BAR
// ======================================================================
function startProgress() {
  progressStart = performance.now();
  progressWrap.style.opacity = '1';
  cancelAnimationFrame(progressRAF);

  (function tick() {
    const elapsed = performance.now() - progressStart;
    const pct = Math.max(0, 1 - elapsed / DRAW_INTERVAL_MS);
    progressBar.style.transform = 'scaleX(' + pct + ')';
    if (state === 'EN_JUEGO') progressRAF = requestAnimationFrame(tick);
  })();
}

function stopProgress() {
  cancelAnimationFrame(progressRAF);
  progressWrap.style.opacity = '0.2';
  progressBar.style.transform = 'scaleX(0)';
}

// ======================================================================
//  DRAW LOGIC
// ======================================================================
function drawNext() {
  if (drawIndex >= 75) { endGame(); return; }

  const num = numbers[drawIndex++];
  drawnSet.add(num);

  renderBall(num);
  markDrawn(num);
  updateRecent();
  counterEl.textContent = drawIndex;

  if (soundEnabled) playDrawSound();
  if (drawIndex >= 75) { setTimeout(endGame, 1500); return; }

  startProgress();
}

// ======================================================================
//  GAME CONTROL
// ======================================================================
function startGame() {
  numbers = shuffle(Array.from({ length: 75 }, (_, i) => i + 1));
  drawIndex = 0;
  drawnSet.clear();

  buildGrid();
  renderEmptyBall();
  updateRecent();
  counterEl.textContent = '0';
  btnPause.innerHTML = '<span class="material-symbols-outlined">pause_circle</span><span>Pausar</span>';
  progressBar.style.transform = 'scaleX(1)';

  showScreen('game');
  initAudio();

  state = 'EN_JUEGO';
  particleMode = 'ambient';

  drawNext();
  timerId = setInterval(drawNext, DRAW_INTERVAL_MS);
}

function pauseGame() {
  if (state === 'EN_JUEGO') {
    state = 'EN_PAUSA';
    clearInterval(timerId);
    stopProgress();
    btnPause.innerHTML = '<span class="material-symbols-outlined">play_circle</span><span>Reanudar</span>';
  } else if (state === 'EN_PAUSA') {
    state = 'EN_JUEGO';
    startProgress();
    timerId = setInterval(drawNext, DRAW_INTERVAL_MS);
    btnPause.innerHTML = '<span class="material-symbols-outlined">pause_circle</span><span>Pausar</span>';
  }
}

function declareBingo() {
  if (state !== 'EN_JUEGO' && state !== 'EN_PAUSA') return;
  state = 'BINGO';
  clearInterval(timerId);
  stopProgress();
  particleMode = 'victory';
  if (soundEnabled) playVictorySound();
  showScreen('bingo');
}

function endGame() {
  state = 'FIN';
  clearInterval(timerId);
  stopProgress();
  showScreen('fin');
}

function newGame() {
  clearInterval(timerId);
  cancelAnimationFrame(progressRAF);
  state = 'INICIO';
  particleMode = 'ambient';
  showScreen('welcome');
  screenWelcome.style.animation = 'none';
  screenWelcome.offsetHeight;
  screenWelcome.style.animation = '';
}

// ======================================================================
//  AUDIO ENGINE  (Web Audio API — no external files)
// ======================================================================
function initAudio() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  if (audioCtx.state === 'suspended') audioCtx.resume();
}

function playDrawSound() {
  if (!audioCtx || audioCtx.state !== 'running') return;
  const now = audioCtx.currentTime;

  const sr = audioCtx.sampleRate;
  const len = Math.floor(sr * 0.55);
  const buf = audioCtx.createBuffer(1, len, sr);
  const d = buf.getChannelData(0);
  for (let i = 0; i < len; i++) d[i] = Math.random() * 2 - 1;

  const noise = audioCtx.createBufferSource();
  noise.buffer = buf;

  const bp = audioCtx.createBiquadFilter();
  bp.type = 'bandpass';
  bp.frequency.setValueAtTime(700, now);
  bp.frequency.linearRampToValueAtTime(1800, now + 0.35);
  bp.Q.value = 2.5;

  const ng = audioCtx.createGain();
  ng.gain.setValueAtTime(0.03, now);
  ng.gain.linearRampToValueAtTime(0.10, now + 0.25);
  ng.gain.linearRampToValueAtTime(0, now + 0.55);

  noise.connect(bp).connect(ng).connect(audioCtx.destination);
  noise.start(now); noise.stop(now + 0.55);

  const osc = audioCtx.createOscillator();
  osc.type = 'sine'; osc.frequency.value = 932;
  const og = audioCtx.createGain();
  og.gain.setValueAtTime(0.22, now + 0.45);
  og.gain.exponentialRampToValueAtTime(0.001, now + 1.0);
  osc.connect(og).connect(audioCtx.destination);
  osc.start(now + 0.45); osc.stop(now + 1.0);

  const osc2 = audioCtx.createOscillator();
  osc2.type = 'sine'; osc2.frequency.value = 1864;
  const og2 = audioCtx.createGain();
  og2.gain.setValueAtTime(0.08, now + 0.46);
  og2.gain.exponentialRampToValueAtTime(0.001, now + 0.85);
  osc2.connect(og2).connect(audioCtx.destination);
  osc2.start(now + 0.46); osc2.stop(now + 0.85);
}

function playVictorySound() {
  if (!audioCtx || audioCtx.state !== 'running') return;
  const now = audioCtx.currentTime;

  const notes = [523.25, 659.25, 783.99, 1046.50];

  notes.forEach((freq, i) => {
    const t = now + i * 0.13;
    const osc = audioCtx.createOscillator();
    osc.type = 'triangle'; osc.frequency.value = freq;
    const g = audioCtx.createGain();
    g.gain.setValueAtTime(0, t);
    g.gain.linearRampToValueAtTime(0.22, t + 0.04);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.55);
    osc.connect(g).connect(audioCtx.destination);
    osc.start(t); osc.stop(t + 0.55);
  });

  const ct = now + 0.55;
  notes.forEach((freq) => {
    const osc = audioCtx.createOscillator();
    osc.type = 'sine'; osc.frequency.value = freq;
    const g = audioCtx.createGain();
    g.gain.setValueAtTime(0.10, ct);
    g.gain.exponentialRampToValueAtTime(0.001, ct + 2.5);
    osc.connect(g).connect(audioCtx.destination);
    osc.start(ct); osc.stop(ct + 2.5);
  });

  const osc5 = audioCtx.createOscillator();
  osc5.type = 'triangle'; osc5.frequency.value = 1567.98;
  const g5 = audioCtx.createGain();
  g5.gain.setValueAtTime(0.08, ct + 0.1);
  g5.gain.exponentialRampToValueAtTime(0.001, ct + 2.0);
  osc5.connect(g5).connect(audioCtx.destination);
  osc5.start(ct + 0.1); osc5.stop(ct + 2.0);
}

function toggleSound() {
  soundEnabled = !soundEnabled;
  btnSound.innerHTML = soundEnabled
    ? '<span class="material-symbols-outlined">volume_up</span>'
    : '<span class="material-symbols-outlined">volume_off</span>';
}

// ======================================================================
//  PARTICLE SYSTEM
// ======================================================================
const canvas = $('particles');
const pCtx = canvas.getContext('2d');
let particles = [];

function resizeCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}

const BOKEH_COLORS = ['#D4AF37', '#F2CA50', '#2E86DE', '#A855F7'];
const CONFETTI_COLORS = ['#F2CA50', '#D4AF37', '#F2CA50', '#D4AF37', '#F2CA50', '#E5E2E1'];

class Particle {
  constructor(mode) { this.init(mode); }

  init(mode) {
    if (mode === 'victory') {
      this.x = Math.random() * canvas.width;
      this.y = -20 - Math.random() * 40;
      this.vx = (Math.random() - 0.5) * 6;
      this.vy = Math.random() * 3 + 1.5;
      this.w = Math.random() * 10 + 5;
      this.h = Math.random() * 6 + 3;
      this.rot = Math.random() * Math.PI * 2;
      this.rv = (Math.random() - 0.5) * 0.15;
      this.color = CONFETTI_COLORS[Math.floor(Math.random() * CONFETTI_COLORS.length)];
      this.life = 1;
      this.decay = 0.002 + Math.random() * 0.004;
      this.type = 'confetti';
    } else {
      this.radius = 20 + Math.random() * 40;
      this.x = Math.random() * canvas.width;
      this.y = Math.random() * canvas.height;
      this.vx = (Math.random() - 0.5) * 0.2;
      this.vy = (Math.random() - 0.5) * 0.15;
      this.color = BOKEH_COLORS[Math.floor(Math.random() * BOKEH_COLORS.length)];
      this.life = 1;
      this.decay = 0.0008 + Math.random() * 0.0012;
      this.type = 'bokeh';
      this.maxAlpha = 0.03 + Math.random() * 0.03;
    }
  }

  update() {
    this.x += this.vx;
    this.y += this.vy;
    this.life -= this.decay;
    if (this.type === 'confetti') {
      this.vy += 0.04;
      this.rot += this.rv;
      this.vx *= 0.999;
    }
    return this.life > 0;
  }

  draw(ctx) {
    ctx.save();
    if (this.type === 'confetti') {
      ctx.globalAlpha = Math.min(this.life * 0.7, 0.7);
      ctx.translate(this.x, this.y);
      ctx.rotate(this.rot);
      ctx.fillStyle = this.color;
      ctx.fillRect(-this.w / 2, -this.h / 2, this.w, this.h);
    } else {
      ctx.globalAlpha = this.life * this.maxAlpha;
      const grad = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.radius);
      grad.addColorStop(0, this.color);
      grad.addColorStop(1, 'transparent');
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.restore();
  }
}

function animateParticles() {
  pCtx.clearRect(0, 0, canvas.width, canvas.height);

  const maxCount = particleMode === 'victory' ? 200 : 18;
  const spawnBurst = particleMode === 'victory' ? 4 : 1;

  if (particles.length < maxCount) {
    for (let i = 0; i < spawnBurst; i++) {
      if (Math.random() < (particleMode === 'victory' ? 0.35 : 0.12)) {
        particles.push(new Particle(particleMode));
      }
    }
  }

  particles = particles.filter((p) => {
    if (p.update()) { p.draw(pCtx); return true; }
    return false;
  });

  requestAnimationFrame(animateParticles);
}

// ======================================================================
//  EVENT HANDLERS
// ======================================================================
$('btn-start').addEventListener('click', startGame);
btnPause.addEventListener('click', pauseGame);
$('btn-bingo').addEventListener('click', declareBingo);
$('btn-new').addEventListener('click', newGame);
$('btn-new-bingo').addEventListener('click', newGame);
$('btn-new-fin').addEventListener('click', newGame);
btnSound.addEventListener('click', toggleSound);

// Keyboard shortcuts
document.addEventListener('keydown', (e) => {
  if (e.code === 'Space') {
    e.preventDefault();
    if (state === 'INICIO') startGame();
    else if (state === 'EN_JUEGO' || state === 'EN_PAUSA') pauseGame();
  }
  if (e.code === 'KeyB' && (state === 'EN_JUEGO' || state === 'EN_PAUSA')) declareBingo();
  if (e.code === 'KeyM') toggleSound();
});

window.addEventListener('resize', resizeCanvas);

// ======================================================================
//  INIT
// ======================================================================
resizeCanvas();
buildGrid();
animateParticles();
</script>
